<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pane</title>
    <script>
      // Apply theme class before React loads to prevent flash
      const savedTheme = localStorage.getItem('theme');
      const validThemes = ['light', 'dark', 'oled', 'dusk', 'forge'];
      const darkThemes = ['dark', 'oled', 'dusk', 'forge'];
      const theme = validThemes.includes(savedTheme) ? savedTheme : 'dark';
      // Dark-based themes need 'dark' class for Tailwind dark: utilities
      if (darkThemes.includes(theme)) document.documentElement.classList.add('dark');
      if (theme !== 'dark') document.documentElement.classList.add(theme);
    </script>
  </head>
  <body>
    <script>
      // Also apply to body (mirrors the head script logic)
      const t = localStorage.getItem('theme');
      const dt = ['dark', 'oled', 'dusk', 'forge'];
      const vt = ['light', 'dark', 'oled', 'dusk', 'forge'];
      const bt = vt.includes(t) ? t : 'dark';
      if (dt.includes(bt)) document.body.classList.add('dark');
      if (bt !== 'dark') document.body.classList.add(bt);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
